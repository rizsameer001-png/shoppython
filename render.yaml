# ─────────────────────────────────────────────────────────────────────────────
# MarketPro — render.yaml
# Place this file at the ROOT of your repository
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Server ──────────────────────────────────────────────────────────
  - type: web
    name: shoppython
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@marketpro.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_ENV
        value: production
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: UPI_ID
        sync: false
      - key: UPI_NAME
        value: MarketPro Store

  # ── React Frontend (Static Site) ───────────────────────────────────────────
  - type: web
    name: shoppy-jhpy
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    envVars:
      - key: VITE_API_URL
        value: https://shoppython.onrender.com/api
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_UPI_ID
        sync: false
      - key: VITE_UPI_NAME
        value: MarketPro Store
