# ─────────────────────────────────────────────────────────────────────────────
# MarketPro — Nginx Reverse Proxy
# Routes:  /api/*  →  api:8000   (FastAPI)
#          /*      →  client:80  (React SPA)
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zone  (10 MB = ~160,000 IPs)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:1m  rate=5r/m;

upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream client_frontend {
    server client:80;
    keepalive 16;
}

# ── HTTP server (port 80) ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Certbot ACME challenge (used when obtaining SSL certs)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # In production uncomment the redirect below and comment out
    # the proxy locations — see HTTPS server block below instead
    # return 301 https://$host$request_uri;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # File upload size (images, videos)
        client_max_body_size 50M;

        # Disable buffering for SSE / streaming responses
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;
    }

    # Stricter rate limit on auth endpoints
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 1M;
    }

    # ── Client proxy (React SPA) ───────────────────────────────────────────────
    location / {
        proxy_pass         http://client_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}


